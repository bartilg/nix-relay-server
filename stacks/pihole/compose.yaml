services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2026.07.2
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "5006:80/tcp"
    env_file:
      - /var/lib/homelab/pihole/pihole.env
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
    volumes:
      - /var/lib/homelab/pihole/etc-pihole:/etc/pihole
      - /var/lib/homelab/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.entrypoints=https"
      - "traefik.http.routers.pihole.rule=Host(`${PIHOLE_TRAEFIK_HOST:-pihole.local.ilghost.party}`)"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.routers.pihole.tls.certresolver=cloudflare"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
