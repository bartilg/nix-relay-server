services:
  pihole:
    container_name: pihole
    image: pihole/pihole:2026.07.2
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "5006:80/tcp"
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
    volumes:
      - /var/lib/homelab/pihole/etc-pihole:/etc/pihole
      - /var/lib/homelab/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.entrypoints=https"
      - "traefik.http.routers.pihole.rule=Host(`pihole.local.ilghost.party`)"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.routers.pihole.tls.certresolver=cloudflare"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"

  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync@sha256:951576b448c08df16cc6b46f90cc3b40c44e10dfb56e431dfd0f1ead7d435724
    container_name: nebula-sync
    env_file:
      - /var/lib/homelab/pihole/nebula-sync.env
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      - pihole

networks:
  proxy:
    external: true
