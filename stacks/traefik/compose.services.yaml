services:
  traefik:
    image: traefik:v3.7.8
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - /var/lib/homelab/traefik/traefik.env
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:?set CF_DNS_API_TOKEN in traefik.env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yml:/traefik.yml:ro
      - /var/lib/homelab/traefik:/letsencrypt
      - ./config/dynamic.yml:/config.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS:?set TRAEFIK_DASHBOARD_CREDENTIALS in traefik.env}"
      - "traefik.http.routers.traefik-secure.entrypoints=https"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik-dashboard.local.ilghost.party`)"
      - "traefik.http.routers.traefik-secure.middlewares=traefik-auth"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-secure.tls.domains[0].main=local.ilghost.party"
      - "traefik.http.routers.traefik-secure.tls.domains[0].sans=*.local.ilghost.party"
      - "traefik.http.routers.traefik-secure.service=api@internal"

networks:
  proxy:
    external: true
