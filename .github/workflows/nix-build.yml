name: NixOS build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build NixOS configurations
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: nix-relay-nixos
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build all hosts
        run: |
          nix build --print-build-logs \
            .#nixosConfigurations.nix01.config.system.build.toplevel \
            .#nixosConfigurations.iris.config.system.build.toplevel
