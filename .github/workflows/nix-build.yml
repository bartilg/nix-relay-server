name: NixOS build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build NixOS configurations
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: nix-relay-nixos
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build all hosts
        run: |
          targets=$(nix eval --raw .#nixosConfigurations \
            --apply 'cs: toString (map (n: ".#nixosConfigurations.${n}.config.system.build.toplevel") (builtins.attrNames cs))')
          test -n "$targets"
          echo "Building: $targets"
          nix build --print-build-logs $targets
